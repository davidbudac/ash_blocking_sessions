<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blocking Incident Brief — redesign preview A</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#1f2a36; --muted:#6b7887; --line:#e3e7ec;
    --crit:#c0392b; --crit-bg:#fdecea; --warn:#e08e0b; --ok:#1e8449; --accent:#2c5f86;
    --track:#f2f5f8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:13.5px;line-height:1.5}
  .wrap{max-width:1160px;margin:0 auto;padding:22px 22px 60px}
  .topline{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .topline h1{font-size:17px;font-weight:650;margin:0;letter-spacing:.2px}
  .topline .meta{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#eef1f4;padding:0 5px;border-radius:4px;font-size:.9em}

  /* verdict hero */
  .verdict{background:var(--card);border:1px solid var(--line);border-left:6px solid var(--crit);
    border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(20,30,45,.06)}
  .sev{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;padding:4px 11px;border-radius:20px}
  .sev .dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}70%{box-shadow:0 0 0 7px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
  .verdict h2{font-size:22px;line-height:1.28;margin:13px 0 6px;font-weight:600}
  .verdict h2 .who{color:var(--crit)}
  .verdict .sub{font-size:14.5px;color:#39485a;margin:0}
  .action{margin-top:13px;font-size:13px;background:#f7f9fb;border:1px solid var(--line);
    border-radius:8px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start}
  .action .ic{color:var(--accent);font-weight:800;white-space:nowrap}
  .cmd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#2c3e50}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px;margin-top:15px}
  .kpi{background:#f8fafb;border:1px solid var(--line);border-radius:8px;padding:11px 13px}
  .kpi .num{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .kpi .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
  .kpi.hot .num{color:var(--crit)}

  .sect-h{display:flex;align-items:center;gap:11px;margin:30px 2px 12px;font-size:11.5px;font-weight:700;
    letter-spacing:.9px;text-transform:uppercase;color:#8593a2}
  .sect-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .sect-h .n{color:var(--accent);font-size:12px}

  /* ledger */
  .ledger-head,.oc-head{display:grid;grid-template-columns:44px minmax(230px,1.35fr) 138px minmax(220px,1.7fr) 18px;
    gap:14px;align-items:center}
  .ledger-head{padding:0 16px 7px;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
  .ledger-head .axis{position:relative;height:14px}
  .ledger-head .axis .tk{position:absolute;transform:translateX(-50%);white-space:nowrap;font-variant-numeric:tabular-nums}
  .cards{display:flex;flex-direction:column;gap:10px}
  .oc{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    box-shadow:0 1px 2px rgba(20,30,45,.05)}
  .oc.ongoing{border-left:4px solid var(--crit)}
  .oc.cleared{border-left:4px solid #cdd5dd}
  .oc-head{padding:12px 16px;cursor:pointer}
  @media(max-width:840px){.ledger-head{display:none}.oc-head{grid-template-columns:44px 1fr;row-gap:9px}
    .oc-impact,.oc-track,.oc-caret{grid-column:1/-1}}
  .oc-rank{font-size:24px;font-weight:800;color:#c3ccd6;text-align:center;font-variant-numeric:tabular-nums}
  .oc.ongoing .oc-rank{color:var(--crit)}
  .oc-id .sid{font-weight:700;font-size:15px}
  .oc-id .dim{color:#9aa7b4}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .b{font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
  .b.lock{background:#eef1f4;color:#3a4a5a}
  .b.idle{background:#fff4e0;color:#9a6207}
  .b.active{background:#e7f2fb;color:#1f5f8b}
  .b.ongoing{background:#fdecea;color:var(--crit)}
  .b.resolved{background:#e8f5ee;color:var(--ok)}
  .chip{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
  .oc-impact .big{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
  .oc-impact .vic{color:var(--muted);font-size:11.5px}
  .bar{height:6px;border-radius:5px;background:#edf0f3;margin-top:6px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:5px}
  /* time track */
  .oc-track{position:relative;height:34px;background:linear-gradient(var(--track),var(--track)) ;border-radius:6px;
    border:1px solid #eef1f4;overflow:hidden}
  .oc-track .span{position:absolute;top:0;bottom:0;border-radius:5px;opacity:.16}
  .oc-track svg{position:absolute;inset:0;width:100%;height:100%}
  .oc-track .cap{position:absolute;top:2px;bottom:2px;width:4px;border-radius:2px}
  .oc-track .cap.live{background:var(--crit);animation:pulse 1.8s infinite}
  .nowline{position:absolute;top:-2px;bottom:-2px;width:0;border-left:1.5px dashed #c0392b}
  .oc-caret{color:#b9c3ce;font-size:12px;transition:transform .15s;text-align:center}
  .oc.open .oc-caret{transform:rotate(90deg)}
  .oc-body{display:none;padding:2px 16px 14px 16px;border-top:1px dashed var(--line);margin:0 16px}
  .oc.open .oc-body{display:block}
  table.vic{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
  table.vic th,table.vic td{text-align:left;padding:5px 8px;border-bottom:1px solid #f0f2f5;vertical-align:top}
  table.vic th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
  table.vic td.sid{font-weight:600}

  .tl-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px 6px;
    box-shadow:0 1px 2px rgba(20,30,45,.05)}
  #timeline{height:170px}
  .legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:#4a5a6a;margin:2px 2px 8px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .foot{color:var(--muted);font-size:11px;margin-top:8px}
  .note{color:var(--muted);font-size:11.5px;margin-top:14px}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="_preview_data.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topline">
    <h1>Blocking Incident Brief</h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="verdict" id="verdict"></div>

  <div class="sect-h"><span class="n">▚</span> Root-cause ledger — one row per chain, ranked by lost session-time</div>
  <div class="ledger-head" id="ledgerHead">
    <div></div><div>Root blocker</div><div>Impact</div><div class="axis" id="axis"></div><div></div>
  </div>
  <div class="cards" id="cards"></div>

  <div class="sect-h"><span class="n">▚</span> Contention over time</div>
  <div class="tl-card">
    <div class="legend" id="tl-legend"></div>
    <div id="timeline"></div>
    <div class="foot">Sessions blocked in each ≈10&nbsp;s ASH sample, stacked by wait class. The dashed line is the window end — a bar touching it means contention was <b>still ongoing</b>.</div>
  </div>
  <div class="note" id="note"></div>
</div>

<script>
(function(){
  var META = window.ASH_META, DATA = window.ASH_DATA;
  var M = window.ASHEngine.buildModel(DATA, META);

  var WC_COLOR = {"Application":"#c0392b","Concurrency":"#7b241c","Configuration":"#8e44ad",
    "Cluster":"#c99a06","User I/O":"#2e86c1","Commit":"#e67e22","System I/O":"#16a085",
    "Network":"#2ecc71","Other":"#7f8c8d","CPU":"#27ae60"};
  function wcColor(wc){ return WC_COLOR[wc] || "#7f8c8d"; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function fmtDur(ms){ var s=Math.round(ms/1000); if(s<60)return s+"s"; var m=Math.floor(s/60),r=s%60; if(m<60)return m+"m"+(r?" "+r+"s":""); var h=Math.floor(m/60);return h+"h "+(m%60)+"m"; }
  function clsPill(wc){ return '<span class="chip" style="background:'+wcColor(wc)+'"></span>'; }
  function hhmm(t){ return String(t).slice(11,16); }
  function pad2(n){ return (n<10?"0":"")+n; }
  function hhmmMs(ms){ var d=new Date(ms); return pad2(d.getHours())+":"+pad2(d.getMinutes()); }

  var beginMs=new Date(META.beginTime).getTime(), endMs=new Date(META.endTime).getTime();
  var span=Math.max(1,endMs-beginMs);
  function pos(t){ return (new Date(t).getTime()-beginMs)/span*100; }

  var roots=M.roots, top=roots[0], maxSamples=roots[0].samples;
  var totalBlockedMs=M.totalSamples*M.SAMPLE_MS;
  var deepest=1+Math.max.apply(null,Object.keys(M.parent).map(function(k){return M.depthOf(k);}).concat([0]));
  var peak=M.peak, anyOngoing=roots.some(function(r){return r.stillActive;});
  var waiterSet={}; DATA.forEach(function(r){ if(r.bSid!=null) waiterSet[r.inst+":"+r.sid]=1; });
  var nWaiters=Object.keys(waiterSet).length;

  document.getElementById("meta").innerHTML =
    esc(META.dbName)+" · "+esc(hhmm(META.beginTime))+"–"+esc(hhmm(META.endTime))+" on "+esc(String(META.beginTime).slice(0,10))+
    (META.conIdFilter?" · CON_ID "+esc(META.conIdFilter):"");

  // severity
  var isCrit=peak.count>=10, isElev=peak.count>=4;
  var level=isCrit?"Critical":isElev?"Elevated":"Minor";
  var sevColor=isCrit?"var(--crit)":isElev?"var(--warn)":"var(--ok)";
  var sevBg=isCrit?"var(--crit-bg)":isElev?"#fdf3e2":"#e8f5ee";

  function serialOf(r){ for(var i=0;i<DATA.length;i++){ if((DATA[i].bInst+":"+DATA[i].bSid)===r.key && DATA[i].bSer!=null) return DATA[i].bSer; } return "?"; }

  var whoTop=(top.user||"?")+" · "+(top.module||"?");
  var lockShort=(top.topEvent||"a lock").replace(/^enq: /,"").replace(/ contention$/,"");
  var second=roots[1]?roots[1].samples:0;
  var dominant=top.samples/M.totalSamples>=0.3 || top.samples>=1.3*second;
  var rootLabel=dominant?"Root cause":"Top root cause (of "+roots.length+" chains)";
  var idleTxt=top.idle
    ? "It was never sampled running SQL while holding the lock — the signature of an <b>idle, uncommitted transaction</b>."
    : ("It was actively running SQL "+(top.sqlId?"<code>"+esc(top.sqlId)+"</code>":"")+" while holding the lock.");
  var ongoingTxt=top.stillActive?" <b style='color:var(--crit)'>Still active at window end.</b>":" Cleared before the window ended.";
  var action=top.idle
    ? ('<span class="ic">➤ Act:</span><span>Locate blocker <code>SID '+esc(top.sid)+', SERIAL# '+esc(serialOf(top))+'</code> ('+esc(whoTop)+') in <code>V$SESSION</code>. It is holding an uncommitted transaction — get the owning app to commit/rollback, or <span class="cmd">ALTER SYSTEM KILL SESSION \''+esc(top.sid)+','+esc(serialOf(top))+'\'</span> as a last resort.</span>')
    : ('<span class="ic">➤ Act:</span><span>Tune or reschedule blocker <code>SID '+esc(top.sid)+'</code> ('+esc(whoTop)+'), running SQL '+(top.sqlId?"<code>"+esc(top.sqlId)+"</code>":"")+' while holding the lock.</span>');

  var v=document.getElementById("verdict");
  v.style.borderLeftColor=sevColor;
  v.innerHTML=
    '<span class="sev" style="color:'+sevColor+';background:'+sevBg+'"><span class="dot" style="background:'+sevColor+'"></span>'+level+" blocking"+(anyOngoing?" · ongoing":"")+'</span>'+
    '<h2>'+rootLabel+': <span class="who">session '+esc(top.sid)+'</span> — '+esc(whoTop)+'</h2>'+
    '<p class="sub">Holding a <b>'+esc(lockShort)+'</b> lock, it blocked <b>'+top.victims+' session'+(top.victims>1?'s':'')+'</b> for <b>≈'+fmtDur(top.blockedMs)+'</b> — the single biggest contributor this window. '+idleTxt+ongoingTxt+'</p>'+
    '<div class="action">'+action+'</div>'+
    '<div class="kpis">'+
      '<div class="kpi hot"><div class="num">'+fmtDur(totalBlockedMs)+'</div><div class="lbl">Blocked session-time</div></div>'+
      '<div class="kpi"><div class="num">'+nWaiters+'</div><div class="lbl">Sessions blocked</div></div>'+
      '<div class="kpi"><div class="num">'+roots.length+'</div><div class="lbl">Distinct chains</div></div>'+
      '<div class="kpi hot"><div class="num">'+peak.count+'</div><div class="lbl">Peak blocked at once</div></div>'+
      '<div class="kpi"><div class="num">'+deepest+'</div><div class="lbl">Deepest chain</div></div>'+
    '</div>';

  // axis ticks aligned to the track column
  (function(){
    var ax=document.getElementById("axis"), html="";
    for(var i=0;i<=4;i++){ var t=beginMs+span*i/4; html+='<span class="tk" style="left:'+(i/4*100)+'%">'+hhmmMs(t)+'</span>'; }
    ax.innerHTML=html;
  })();

  // per-root sparkline values (blocked count per sample)
  var idxT={}; M.times.forEach(function(t,i){idxT[t]=i;});
  function sparkFor(rootKey){ var s=M.times.map(function(){return 0;});
    DATA.forEach(function(r){ if(r.bSid==null)return; if(M.rootOf(r.inst+":"+r.sid)===rootKey) s[idxT[r.t]]++; }); return s; }
  function trackSVG(rootKey,color){
    var vals=sparkFor(rootKey), mx=Math.max.apply(null,vals.concat([1]));
    var pts=[]; M.times.forEach(function(t,i){ if(vals[i]>0){ var x=pos(t); var y=100-(vals[i]/mx*88)-6; pts.push([x,y,vals[i]]); } });
    if(!pts.length) return "";
    // area path across active samples
    var d="M "+pts[0][0].toFixed(2)+" 100 ";
    pts.forEach(function(p){ d+="L "+p[0].toFixed(2)+" "+p[1].toFixed(2)+" "; });
    d+="L "+pts[pts.length-1][0].toFixed(2)+" 100 Z";
    return '<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="'+d+'" fill="'+color+'" fill-opacity="0.55"/></svg>';
  }

  var wcOfEvent={}; DATA.forEach(function(r){ if(r.ev) wcOfEvent[r.ev]=r.wc; });
  function victimsOf(rootKey){
    var agg={};
    DATA.forEach(function(r){ if(r.bSid==null)return; var w=r.inst+":"+r.sid; if(M.rootOf(w)!==rootKey)return;
      var a=agg[w]||(agg[w]={sid:r.sid,samples:0,ev:{},user:r.user,module:r.module,depth:M.depthOf(w)}); a.samples++; if(r.ev)a.ev[r.ev]=(a.ev[r.ev]||0)+1; });
    return Object.keys(agg).map(function(k){var a=agg[k],ev=null,bc=-1; Object.keys(a.ev).forEach(function(e){if(a.ev[e]>bc){bc=a.ev[e];ev=e;}}); a.topEv=ev; return a;}).sort(function(x,y){return y.samples-x.samples;});
  }

  var cardsHtml=roots.map(function(r,i){
    var pct=Math.round(r.samples/maxSamples*100);
    var idleBadge=r.idle?'<span class="b idle">idle holder</span>':'<span class="b active">running SQL</span>';
    var stateBadge=r.stillActive?'<span class="b ongoing">ongoing</span>':'<span class="b resolved">resolved</span>';
    var c=wcColor(r.topClass);
    var x0=pos(r.first), x1=pos(r.last), w=Math.max(0.8,x1-x0);
    var live=r.stillActive;
    var track='<div class="oc-track">'+
        '<div class="span" style="left:'+x0.toFixed(2)+'%;width:'+w.toFixed(2)+'%;background:'+c+'"></div>'+
        trackSVG(r.key,c)+
        '<div class="cap'+(live?' live':'')+'" style="left:'+Math.min(99,x1).toFixed(2)+'%;background:'+(live?'var(--crit)':c)+'"></div>'+
        (live?'<div class="nowline" style="left:'+pos(META.endTime).toFixed(2)+'%"></div>':'')+
      '</div>';
    var vicRows=victimsOf(r.key).map(function(vv){
      return '<tr><td class="sid">'+esc(vv.sid)+(vv.depth>1?' <span class="dim">(depth '+vv.depth+')</span>':'')+'</td>'+
        '<td>'+esc(vv.user||"?")+' · '+esc(vv.module||"?")+'</td>'+
        '<td>'+clsPill(wcOfEvent[vv.topEv])+esc((vv.topEv||"").replace(/^enq: /,""))+'</td>'+
        '<td style="text-align:right;font-variant-numeric:tabular-nums">'+fmtDur(vv.samples*M.SAMPLE_MS)+'</td></tr>';
    }).join("");
    return '<div class="oc '+(live?'ongoing':'cleared')+'" data-i="'+i+'">'+
      '<div class="oc-head">'+
        '<div class="oc-rank">'+(i+1)+'</div>'+
        '<div class="oc-id"><div><span class="sid">SID '+esc(r.sid)+'</span> <span class="dim">·</span> '+esc(r.user||"?")+' · '+esc(r.module||"?")+'</div>'+
          '<div class="badges"><span class="b lock">'+clsPill(r.topClass)+esc((r.topEvent||"?").replace(/^enq: /,""))+'</span>'+idleBadge+stateBadge+'</div></div>'+
        '<div class="oc-impact"><span class="big">'+fmtDur(r.blockedMs)+'</span> <span class="vic">· '+r.victims+' victim'+(r.victims>1?'s':'')+'</span>'+
          '<div class="bar"><i style="width:'+pct+'%;background:'+c+'"></i></div></div>'+
        track+
        '<div class="oc-caret">▸</div>'+
      '</div>'+
      '<div class="oc-body"><table class="vic"><thead><tr><th>Victim SID</th><th>Identity</th><th>Wait event</th><th style="text-align:right">Blocked</th></tr></thead><tbody>'+vicRows+'</tbody></table></div>'+
    '</div>';
  }).join("");
  document.getElementById("cards").innerHTML=cardsHtml;
  document.getElementById("cards").addEventListener("click",function(e){ var h=e.target.closest(".oc-head"); if(h) h.parentNode.classList.toggle("open"); });

  // timeline stacked by wait class
  var classes=M.classes.slice().sort();
  var series=classes.map(function(wc){ return {name:wc,type:"bar",stack:"a",itemStyle:{color:wcColor(wc)},
    data:M.perSample.map(function(s){return [s.ms,s.byClass[wc]||0];})}; });
  document.getElementById("tl-legend").innerHTML=classes.map(function(wc){return '<span>'+clsPill(wc)+esc(wc)+'</span>';}).join("");
  var tl=echarts.init(document.getElementById("timeline"));
  tl.setOption({
    grid:{left:34,right:16,top:10,bottom:24},
    tooltip:{trigger:"axis",axisPointer:{type:"shadow"},valueFormatter:function(v){return v+" blocked";}},
    xAxis:{type:"time",axisLabel:{color:"#8593a2",fontSize:11},axisLine:{lineStyle:{color:"#d5dbe1"}}},
    yAxis:{type:"value",axisLabel:{color:"#8593a2",fontSize:11},splitLine:{lineStyle:{color:"#eef1f4"}}},
    series:series.concat([{type:"line",silent:true,data:[],
      markLine:{symbol:"none",silent:true,lineStyle:{color:"#c0392b",type:"dashed",width:1.4},
        label:{formatter:"window end",color:"#c0392b",fontSize:10,position:"insideEndTop"},
        data:[{xAxis:endMs}]},
      markPoint:{silent:true,symbolSize:1,data:[{coord:[peak.ms,peak.count],
        label:{formatter:"peak "+peak.count,color:"#c0392b",fontSize:10,position:"top",fontWeight:700}}]}}])
  });
  window.addEventListener("resize",function(){tl.resize();});

  document.getElementById("note").innerHTML="Preview A of 3 · decision-first “incident brief” layout · real demo dataset ("+M.totalSamples+" blocked samples, "+roots.length+" chains). Every root here was an idle lock-holder; the “running SQL” state renders when a blocker is sampled active.";
})();
</script>
</body>
</html>
